info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "Enkoki4",
         "password": "cannotDefeatOrinOfWater"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const accessToken = res.body.accessToken;
        const userId = res.body.user_id;
        bru.setVar("userId",userId);
        bru.setVar("accessToken", accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
