info:
  name: feed
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/posts/feed?limit=10&page=1&categoryId={{categoryId}}"
  params:
    - name: limit
      value: "10"
      type: query
    - name: page
      value: "1"
      type: query
    - name: categoryId
      value: "{{categoryId}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const postId = res.body.data[0]?.postId;
        const slug = res.body.data[0]?.slug;
        if (postId){
        bru.setVar("postId", postId);}
        if (slug) {bru.setVar("slug", slug);}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
