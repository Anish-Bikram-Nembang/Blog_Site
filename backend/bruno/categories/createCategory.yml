info:
  name: createCategory
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/categories"
  body:
    type: json
    data: |-
      {
        "name": "Action"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const categoryId = res.body.categoryId;
        bru.setEnvVar("categoryId", categoryId);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
